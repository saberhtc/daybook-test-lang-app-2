<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoDeck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e1e1e; border-radius: 12px; padding: 2rem; width: 360px; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
    input { width: 100%; padding: .6rem .8rem; margin-bottom: .75rem; border: 1px solid #333; border-radius: 6px; background: #111; color: #eee; font-size: 1rem; }
    button { width: 100%; padding: .7rem; background: #4f8ef7; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #3a7ae8; }
    .toggle { text-align: center; margin-top: 1rem; font-size: .9rem; color: #888; cursor: pointer; }
    .toggle span { color: #4f8ef7; }
    .msg { margin-top: .75rem; text-align: center; font-size: .9rem; color: #f87; }
  </style>
</head>
<body>
<div class="card">
  <h1>LingoDeck</h1>
  <div id="auth-form">
    <input id="email" type="email" placeholder="Email" />
    <input id="name" type="text" placeholder="Name" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="submit()">Sign up</button>
    <div class="toggle" onclick="toggleMode()">Already have an account? <span>Log in</span></div>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
  let mode = 'register';
  function toggleMode() {
    mode = mode === 'register' ? 'login' : 'register';
    document.querySelector('button').textContent = mode === 'register' ? 'Sign up' : 'Log in';
    document.querySelector('.toggle').innerHTML = mode === 'register'
      ? 'Already have an account? <span>Log in</span>'
      : "Don't have an account? <span>Sign up</span>";
    document.getElementById('name').style.display = mode === 'register' ? '' : 'none';
  }

  async function submit() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const name = document.getElementById('name').value;
    const url = mode === 'register' ? '/api/auth/register' : '/api/auth/login';
    const body = mode === 'register' ? { email, password, name } : { email, password };
    const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const json = await r.json();
    if (r.ok) {
      localStorage.setItem('token', json.data.token);
      document.getElementById('msg').style.color = '#6f6';
      document.getElementById('msg').textContent = 'Success! Token saved.';
    } else {
      document.getElementById('msg').style.color = '#f87';
      document.getElementById('msg').textContent = json.detail || json.error || 'Error';
    }
  }
</script>
</body>
</html>
